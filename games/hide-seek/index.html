<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Fan Hide & Seek</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../shared/leaderboard.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="level-display">Level: 1</span>
      <span id="items-display">Items: 0/0</span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="message-overlay">
      <h1>FAN HIDE & SEEK</h1>
      <p>Use arrow keys to sneak past guards</p>
      <p>Collect items for bonus points</p>
      <p>Reach the exit door to win!</p>
      <button id="start-btn">START</button>
    </div>
  </div>
  <div id="leaderboard-container"></div>
  <script src="../../shared/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
