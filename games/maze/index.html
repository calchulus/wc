<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>World Cup Maze</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../shared/leaderboard.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="level-display">Level: 1</span>
      <span id="timer-display">Time: 0</span>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div id="overlay">
      <h1>WORLD CUP MAZE</h1>
      <p>Use arrow keys to navigate</p>
      <p>Reach the goal (🥅) past the defenders (🏃)</p>
      <p>Collect stars (⭐) for bonus points</p>
      <button class="btn" id="start-btn">ENTER THE MAZE</button>
    </div>
  </div>
  <div id="leaderboard-container"></div>
  <script src="../../shared/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
