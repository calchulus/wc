<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Penalty Kick Duel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../shared/leaderboard.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="round-display">Round: 1/5</span>
    </div>
    <canvas id="gameCanvas" width="600" height="500"></canvas>
    <div id="power-bar-container">
      <div id="power-bar"></div>
    </div>
    <div id="message-overlay">
      <h1>PENALTY KICK DUEL</h1>
      <p>Move crosshair to aim</p>
      <p>Hold mouse/touch to charge power bar</p>
      <p>Release to shoot! Green zone = optimal</p>
      <p>Best of 5 rounds</p>
      <button id="start-btn">KICK OFF</button>
    </div>
    <div id="leaderboard-container"></div>
  </div>
  <script src="../../shared/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
