<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Commentary Typing Race</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../shared/leaderboard.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="round-display">Round: 1/10</span>
      <span id="wpm-display">WPM: 0</span>
    </div>
    <div id="game-area">
      <div id="commentary-text"></div>
      <div id="typed-display"></div>
      <div id="timer-display">0.0s</div>
      <div id="accuracy-display">100%</div>
    </div>
    <div id="message-overlay">
      <h1>COMMENTARY TYPING RACE</h1>
      <p>Type football commentary as fast as you can!</p>
      <p>10 rounds, increasing text length</p>
      <button id="start-btn">START RACE!</button>
    </div>
  </div>
  <div id="leaderboard-container"></div>
    <a href="../../index.html" class="back-btn">← Back to All Games</a>
  <script src="../../shared/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
