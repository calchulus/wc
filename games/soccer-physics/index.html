<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Soccer Physics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <span id="round-display">Round: 1/5</span>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="message-overlay">
      <h1>SOCCER PHYSICS</h1>
      <p>Click & drag to aim and set power</p>
      <p>Release to launch the player!</p>
      <p>Get the ball into the goal</p>
      <button id="start-btn">KICK OFF</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
